  { question: "Η φωτόσφαιρα είναι το εξωτερικό στρώμα του Ήλιου που βλέπουμε.", answer: true, category: "Επιστήμη", explanation: "Σωστό. Η φωτόσφαιρα είναι η ορατή επιφάνεια του Ήλιου, σε θερμοκρασία ~5.500°C." },
  { question: "Η φυσική θεωρία της σχετικότητας διατυπώθηκε από τον Νεύτωνα.", answer: false, category: "Επιστήμη", explanation: "Λάθος. Η θεωρία της σχετικότητας διατυπώθηκε από τον Άλμπερτ Αϊνστάιν το 1905 (ειδική) και 1915 (γενική)." },
  { question: "Τα ερυθρά αιμοσφαίρια μεταφέρουν οξυγόνο.", answer: true, category: "Επιστήμη", explanation: "Σωστό. Τα ερυθρά αιμοσφαίρια περιέχουν αιμοσφαιρίνη που δεσμεύει και μεταφέρει οξυγόνο σε όλο το σώμα." },
  { question: "Η αλλαγή κλίματος δεν επηρεάζει τους ωκεανούς.", answer: false, category: "Επιστήμη", explanation: "Λάθος. Η κλιματική αλλαγή προκαλεί άνοδο της θερμοκρασίας και οξίνιση των ωκεανών." },
  { question: "Τα κβάρκ είναι θεμελιώδη σωμάτια.", answer: true, category: "Επιστήμη", explanation: "Σωστό. Τα κβάρκ είναι θεμελιώδη συστατικά της ύλης που δομούν πρωτόνια και νετρόνια." },
  { question: "Το ήλιο είναι πιο αγώγιμο από τον χρυσό.", answer: false, category: "Επιστήμη", explanation: "Λάθος. Το ήλιο είναι αέριο και δεν άγει ηλεκτρισμό. Ο χρυσός είναι εξαιρετικός αγωγός ηλεκτρισμού." },
  { question: "Το ιώδιο χρησιμοποιείται ως αντισηπτικό.", answer: true, category: "Επιστήμη", explanation: "Σωστό. Το ιώδιο (σε διάλυμα) χρησιμοποιείται ως αντισηπτικό για πληγές και απολύμανση." },
  { question: "Η βαρύτητα μειώνεται όσο απομακρυνόμαστε από τη Γη.", answer: true, category: "Επιστήμη", explanation: "Σωστό. Η βαρυτική έλξη μειώνεται με το τετράγωνο της απόστασης σύμφωνα με τον Νόμο Νεύτωνα." },
  { question: "Το AIDS μεταδίδεται μέσω της αναπνοής.", answer: false, category: "Επιστήμη", explanation: "Λάθος. Ο ιός HIV δεν μεταδίδεται μέσω της αναπνοής αλλά κυρίως μέσω αίματος και σεξουαλικής επαφής." },
  { question: "Το κόκκινο φως έχει μεγαλύτερο μήκος κύματος από το μπλε.", answer: true, category: "Επιστήμη", explanation: "Σωστό. Το κόκκινο φως έχει μήκος κύματος 620-750 nm, ενώ το μπλε 450-495 nm." },
  { question: "Τα βακτήρια έχουν πυρήνα.", answer: false, category: "Επιστήμη", explanation: "Λάθος. Τα βακτήρια είναι προκαρυωτικοί οργανισμοί — δεν έχουν μεμβρανοδεσμευμένο πυρήνα." },
  { question: "Η αντίδραση σύνθεσης νερού ελευθερώνει ενέργεια.", answer: true, category: "Επιστήμη", explanation: "Σωστό. Η αντίδραση 2H₂ + O₂ → 2H₂O είναι εξώθερμη και ελευθερώνει ενέργεια." },
  { question: "Τα φωτοβολταϊκά λειτουργούν και με συννεφιά.", answer: true, category: "Επιστήμη", explanation: "Σωστό. Τα φωτοβολταϊκά λειτουργούν με διάχυτο φως ακόμα και υπό συννεφιά, αν και με μειωμένη απόδοση." },
  { question: "Η πυρηνική σχάση και η πυρηνική σύντηξη είναι η ίδια διαδικασία.", answer: false, category: "Επιστήμη", explanation: "Λάθος. Η σχάση διασπά βαριούς πυρήνες ενώ η σύντηξη ενώνει ελαφριούς — είναι αντίστροφες διαδικασίες." },
  { question: "Το ανθρώπινο μάτι αντιλαμβάνεται περισσότερες αποχρώσεις πράσινου.", answer: true, category: "Επιστήμη", explanation: "Σωστό. Το ανθρώπινο μάτι έχει μεγαλύτερη ευαισθησία στο πράσινο φως λόγω της εξέλιξης." },
  { question: "Το αζωτούχο οξύ είναι ισχυρό οξύ.", answer: true, category: "Επιστήμη", explanation: "Σωστό. Το νιτρικό οξύ (HNO₃) είναι ισχυρό ανόργανο οξύ που ιονίζεται πλήρως σε υδατικό διάλυμα." },

  // ── Ιστορία (κύμα 6) ──
  { question: "Η Μάχη των Θερμοπυλών έγινε το 480 π.Χ.", answer: true, category: "Ιστορία", explanation: "Σωστό. Η Μάχη των Θερμοπυλών, όπου 300 Σπαρτιάτες πολέμησαν εναντίον των Περσών, έγινε το 480 π.Χ." },
  { question: "Ο Νεπολέων Βοναπάρτης νίκησε στη Ρωσία.", answer: false, category: "Ιστορία", explanation: "Λάθος. Η εκστρατεία του Ναπολέοντα στη Ρωσία (1812) ήταν καταστροφική ήττα που οδήγησε στην κατάρρευση της αυτοκρατορίας του." },
  { question: "Ο Αδόλφος Χίτλερ κατέλαβε εξουσία στη Γερμανία το 1933.", answer: true, category: "Ιστορία", explanation: "Σωστό. Ο Χίτλερ ανακηρύχθηκε Καγκελάριος της Γερμανίας στις 30 Ιανουαρίου 1933." },
  { question: "Ο Τίτος ήταν ηγέτης της Γιουγκοσλαβίας.", answer: true, category: "Ιστορία", explanation: "Σωστό. Ο Γιόσιπ Μπροζ Τίτο ήταν Πρόεδρος της Σοσιαλιστικής Ομοσπονδιακής Δημοκρατίας της Γιουγκοσλαβίας από το 1953 έως το 1980." },
  { question: "Ο Πρώτος Παγκόσμιος Πόλεμος τελείωσε το 1918.", answer: true, category: "Ιστορία", explanation: "Σωστό. Ο Α' Παγκόσμιος Πόλεμος έληξε στις 11 Νοεμβρίου 1918 με την ανακωχή." },
  { question: "Ο Ιούλιος Καίσαρας εισέβαλε στην Αγγλία.", answer: true, category: "Ιστορία", explanation: "Σωστό. Ο Ιούλιος Καίσαρας πραγματοποίησε δύο εκστρατείες στη Βρετανία (55 και 54 π.Χ.), αν και δεν κατέκτησε οριστικά τη χώρα." },
  { question: "Η Αμερικανική Ανεξαρτησία ανακηρύχθηκε το 1776.", answer: true, category: "Ιστορία", explanation: "Σωστό. Η Διακήρυξη Ανεξαρτησίας των ΗΠΑ υπογράφηκε στις 4 Ιουλίου 1776." },
  { question: "Ο Κύριλλος και ο Μεθόδιος δημιούργησαν το ελληνικό αλφάβητο.", answer: false, category: "Ιστορία", explanation: "Λάθος. Οι Βυζαντινοί μοναχοί Κύριλλος και Μεθόδιος δημιούργησαν το σλαβικό αλφάβητο (γλαγολίτσα/κυριλλική), όχι το ελληνικό." },
  { question: "Ο Σταλινγκράντ ήταν κρίσιμη μάχη του Β' ΠΠ.", answer: true, category: "Ιστορία", explanation: "Σωστό. Η Μάχη του Στάλινγκραντ (1942-43) ήταν η πιο αιματηρή μάχη στην ανθρώπινη ιστορία και η στροφή στον Β' ΠΠ." },
  { question: "Ο Ρόμπερτ Ε. Λι ήταν στρατηγός των Βορείων στον Αμερικανικό Εμφύλιο.", answer: false, category: "Ιστορία", explanation: "Λάθος. Ο Robert E. Lee ήταν ο κύριος στρατηγός των Νοτίων (Συνομοσπονδία) στον Αμερικανικό Εμφύλιο Πόλεμο." },
  { question: "Η Μεγάλη Βρετανία απέκτησε το εκλογικό δικαίωμα για γυναίκες το 1918.", answer: true, category: "Ιστορία", explanation: "Σωστό. Το 1918 οι Βρετανίδες άνω των 30 ετών απέκτησαν δικαίωμα ψήφου, και το 1928 όλες οι γυναίκες άνω των 21." },
  { question: "Ο Σόκρατης άφησε γραπτά έργα.", answer: false, category: "Ιστορία", explanation: "Λάθος. Ο Σωκράτης δεν άφησε κανένα γραπτό. Η φιλοσοφία του μεταδόθηκε μέσω των διαλόγων του Πλάτωνα." },
  { question: "Η πτώση του Τείχους του Βερολίνου έγινε το 1989.", answer: true, category: "Ιστορία", explanation: "Σωστό. Το Τείχος του Βερολίνου έπεσε στις 9 Νοεμβρίου 1989, σηματοδοτώντας το τέλος του Ψυχρού Πολέμου." },
  { question: "Ο Πυθαγόρας ήταν αρχαίος Έλληνας μαθηματικός και φιλόσοφος.", answer: true, category: "Ιστορία", explanation: "Σωστό. Ο Πυθαγόρας (570-495 π.Χ.) ήταν Έλληνας μαθηματικός και φιλόσοφος, γνωστός για το ομώνυμο θεώρημα." },
  { question: "Η Ινδία δεν χρησιμοποίησε βία για να αποκτήσει ανεξαρτησία.", answer: true, category: "Ιστορία", explanation: "Σωστό. Υπό την ηγεσία του Γκάντι, η Ινδία ακολούθησε σε μεγάλο βαθμό μη-βίαιη αντίσταση (αχίμσα)." },
  { question: "Ο πόλεμος στο Βιετνάμ τελείωσε με αμερικανική νίκη.", answer: false, category: "Ιστορία", explanation: "Λάθος. Ο πόλεμος στο Βιετνάμ (1955-1975) τελείωσε με την ενοποίηση της χώρας υπό κομμουνιστική κυβέρνηση." },
  { question: "Ο Σαλαντίν ήταν διάσημος Μουσουλμάνος ηγέτης.", answer: true, category: "Ιστορία", explanation: "Σωστό. Ο Σαλαντίν (1137-1193) ήταν σουλτάνος της Αιγύπτου και Συρίας, γνωστός για την ανακατάληψη της Ιερουσαλήμ." },
  { question: "Η Βεστφαλία Συνθήκη (1648) τερμάτισε τον Τριακονταετή Πόλεμο.", answer: true, category: "Ιστορία", explanation: "Σωστό. Η Συνθήκη της Βεστφαλίας (1648) τερμάτισε τον Τριακονταετή Πόλεμο και διαμόρφωσε το ευρωπαϊκό σύστημα εθνικών κρατών." },
  { question: "Ο Βενιζέλος ήταν σύγχρονος του Βενιζέλου.", answer: true, category: "Ιστορία", explanation: "Σωστό. Ο Ελευθέριος Βενιζέλος (1864-1936) ήταν ο σημαντικότερος Έλληνας πολιτικός των αρχών του 20ού αιώνα." },
  { question: "Η «Ασημένια Βίβλος» γράφτηκε κατά τον Μεσαίωνα.", answer: false, category: "Ιστορία", explanation: "Λάθος. Η Codex Argenteus (Ασημένιος Κώδικας) γράφτηκε τον 6ο αιώνα μ.Χ., στα πρώιμα βυζαντινά χρόνια." },
  { question: "Ο Δαρβίνος ταξίδεψε στα νησιά Γκαλαπάγκος.", answer: true, category: "Ιστορία", explanation: "Σωστό. Ο Κάρολος Δαρβίνος επισκέφτηκε τα Γκαλαπάγκος το 1835 στο ταξίδι του με το HMS Beagle — εμπειρία που επηρέασε τη θεωρία της εξέλιξης." },
  { question: "Η Μεγάλη Πυρκαγιά του Λονδίνου καταστρέψε τον Πύργο του Λονδίνου.", answer: false, category: "Ιστορία", explanation: "Λάθος. Ο Πύργος του Λονδίνου δεν καταστράφηκε από τη Μεγάλη Πυρκαγιά του 1666." },
  { question: "Η Σοβιετική Ένωση εκτόξευσε τον πρώτο τεχνητό δορυφόρο.", answer: true, category: "Ιστορία", explanation: "Σωστό. Ο Σπούτνικ 1, εκτοξευμένος από τη Σοβιετική Ένωση στις 4 Οκτωβρίου 1957, ήταν ο πρώτος τεχνητός δορυφόρος." },
  { question: "Η Κινεζική Δημοκρατία ιδρύθηκε από τον Μάο Τσε Τουνγκ.", answer: false, category: "Ιστορία", explanation: "Λάθος. Ο Μάο ίδρυσε τη Λαϊκή Δημοκρατία της Κίνας (1949). Η Δημοκρατία της Κίνας ιδρύθηκε το 1912 από τον Σουν Γιατ-σεν." },
  { question: "Ο Αλέξανδρος Ψηλάς ανακάλυψε την Αμερική.", answer: false, category: "Ιστορία", explanation: "Λάθος. Ο Χριστόφορος Κολόμβος 'ανακάλυψε' (για τους Ευρωπαίους) την Αμερική το 1492." },

  // ── Τέχνη & Λογοτεχνία (κύμα 6) ──
  { question: "Ο Εμίλ Ζολά έγραψε τη διάσημη ανοικτή επιστολή «Κατηγορώ».", answer: true, category: "Τέχνη & Λογοτεχνία", explanation: "Σωστό. Ο Εμίλ Ζολά έγραψε την «J'accuse» (Κατηγορώ) το 1898 για την υπόθεση Ντρέιφους." },
  { question: "Ο Μαουρίτς Κορνέλις Έσερ ήταν διάσημος για τις παραδοξολογικές εικαστικές συνθέσεις.", answer: true, category: "Τέχνη & Λογοτεχνία", explanation: "Σωστό. Ο Ολλανδός Μ.Κ. Έσερ (1898-1972) είναι γνωστός για τα αδύνατα κτίσματα και τα οπτικά παράδοξα." },
  { question: "Ο Σαίξπηρ έγραψε «Ο Έμπορος της Βενετίας».", answer: true, category: "Τέχνη & Λογοτεχνία", explanation: "Σωστό. «Ο Έμπορος της Βενετίας» είναι κωμωδία του Ουίλιαμ Σαίξπηρ γραμμένη γύρω στο 1596-1599." },
  { question: "Ο Βέρντι συνέθεσε τον «Βαρβαρόσσα».", answer: false, category: "Τέχνη & Λογοτεχνία", explanation: "Λάθος. «Βαρβαρόσσα» δεν είναι γνωστή όπερα του Βέρντι. Ο Τζουζέπε Βέρντι συνέθεσε «Αΐντα», «Ριγολέτο», «Τραβιάτα» κ.ά." },
  { question: "Ο Ντοστογέφσκι είχε επιληψία.", answer: true, category: "Τέχνη & Λογοτεχνία", explanation: "Σωστό. Ο Φιόντορ Ντοστογέφσκι έπασχε από επιληψία, κάτι που επηρέασε το έργο του." },
  { question: "Ο Δάντης Αλιγκέρι έγραψε τη «Θεία Κωμωδία».", answer: true, category: "Τέχνη & Λογοτεχνία", explanation: "Σωστό. Ο Ιταλός Δάντης Αλιγκέρι (1265-1321) έγραψε τη «Θεία Κωμωδία», ένα από τα κορυφαία έργα της παγκόσμιας λογοτεχνίας." },
  { question: "Ο Αριστοφάνης έγραψε τραγωδίες.", answer: false, category: "Τέχνη & Λογοτεχνία", explanation: "Λάθος. Ο Αριστοφάνης έγραφε κωμωδίες, όχι τραγωδίες. Οι κωμωδίες του περιλαμβάνουν «Όρνιθες», «Νεφέλαι» κ.ά." },
  { question: "Ο Ίψεν ήταν Νορβηγός θεατρικός συγγραφέας.", answer: true, category: "Τέχνη & Λογοτεχνία", explanation: "Σωστό. Ο Χένρικ Ίψεν (1828-1906) είναι ένας από τους πατέρες του σύγχρονου δράματος, γνωστός για «Κούκλα Σπίτι»." },
  { question: "Ο Πεντελικός είναι διάσημος για τα γλυπτά του.", answer: false, category: "Τέχνη & Λογοτεχνία", explanation: "Λάθος. Ο Πεντελικός είναι διάσημος για το λευκό μάρμαρό του που χρησιμοποιήθηκε για τον Παρθενώνα." },
  { question: "Ο Άγγελος Τερζάκης ήταν Έλληνας πεζογράφος.", answer: true, category: "Τέχνη & Λογοτεχνία", explanation: "Σωστό. Ο Άγγελος Τερζάκης (1907-1979) ήταν σημαντικός Έλληνας πεζογράφος και δραματουργός." },
  { question: "Ο Ρούμι ήταν Πέρσης μυστικιστής ποιητής.", answer: true, category: "Τέχνη & Λογοτεχνία", explanation: "Σωστό. Ο Τζαλαλ αντ-Ντιν Ρούμι (1207-1273) ήταν σούφι μυστικιστής και ποιητής, ένας από τους πιο διαβασμένους ποιητές στον κόσμο." },
  { question: "Η «Αμαρτωλή» είναι μυθιστόρημα της Πηνελόπης Δέλτα.", answer: false, category: "Τέχνη & Λογοτεχνία", explanation: "Λάθος. Διάσημα έργα της Πηνελόπης Δέλτα είναι «Παιδιά της Γαλήνης», «Τρελαντώνης» κ.ά., όχι «Αμαρτωλή»." },
  { question: "Ο Σκαρλάτι ήταν Ιταλός συνθέτης του Μπαρόκ.", answer: true, category: "Τέχνη & Λογοτεχνία", explanation: "Σωστό. Ο Ντομένικο Σκαρλάτι (1685-1757) ήταν Ιταλός συνθέτης του Μπαρόκ, γνωστός για τις σονάτες πληκτρολόγιου." },
  { question: "Ο «Γκράτσιο» είναι βασικός χαρακτήρας της «Οδύσσειας».", answer: false, category: "Μυθολογία", explanation: "Λάθος. Βασικοί χαρακτήρες της Οδύσσειας είναι ο Οδυσσέας, η Πηνελόπη, ο Τηλέμαχος κ.ά." },
  { question: "Ο Φρεντερίκ Σοπέν γεννήθηκε στην Πολωνία.", answer: true, category: "Τέχνη & Λογοτεχνία", explanation: "Σωστό. Ο Φρεντέρικ Σοπέν (1810-1849) γεννήθηκε κοντά στη Βαρσοβία της Πολωνίας." },
  { question: "Ο Μαλαρμέ ήταν Γάλλος Συμβολιστής ποιητής.", answer: true, category: "Τέχνη & Λογοτεχνία", explanation: "Σωστό. Ο Στεφάν Μαλαρμέ (1842-1898) ήταν κεντρικός εκπρόσωπος του γαλλικού Συμβολισμού." },
  { question: "Ο «Δον Κιχώτης» είναι τρελός χαρακτήρας που πολεμά ανεμόμυλους.", answer: true, category: "Τέχνη & Λογοτεχνία", explanation: "Σωστό. Ο Δον Κιχώτης, ο ήρωας του Σερβάντες, επιτίθεται σε ανεμόμυλους νομίζοντάς τους γίγαντες." },
  { question: "Ο Αλμπέρ Καμύ ήταν Βέλγος υπαρξιστής.", answer: false, category: "Τέχνη & Λογοτεχνία", explanation: "Λάθος. Ο Αλμπέρ Καμύ ήταν Γαλλοαλγερινός συγγραφέας που σχετίζεται με τον αμπσουρντισμό, όχι τον υπαρξισμό." },
  { question: "Η «Μαντάμ Μποβαρύ» έγραψε ο Φλωμπέρ.", answer: true, category: "Τέχνη & Λογοτεχνία", explanation: "Σωστό. Το «Μαντάμ Μποβαρύ» (1857) είναι το αριστούργημα του Γάλλου Γκυστάβ Φλωμπέρ." },
  { question: "Ο Φεδερίκο Φελίνι ήταν σκηνοθέτης.", answer: true, category: "Τέχνη & Λογοτεχνία", explanation: "Σωστό. Ο Φεντερίκο Φελίνι (1920-1993) ήταν θρυλικός Ιταλός κινηματογραφιστής με έργα όπως «8½» και «La Dolce Vita»." },
  { question: "Ο Παρθενώνας βρίσκεται στην Ακρόπολη των Αθηνών.", answer: true, category: "Τέχνη & Λογοτεχνία", explanation: "Σωστό. Ο Παρθενώνας (447-432 π.Χ.) βρίσκεται στην κορυφή της Ακρόπολης στην Αθήνα." },

  // ── Αθλητισμός (κύμα 6) ──
  { question: "Ο Ρόναλντο (R9) αναφέρεται στον Βραζιλιάνο Ρονάλντο.", answer: true, category: "Αθλητισμός", explanation: "Σωστό. Το «R9» είναι το παρατσούκλι του Βραζιλιάνου Ρονάλντο Λουίς Ναζάριο, ο οποίος φορούσε τη φανέλα Νο9." },

const BODY_PARTS = ['h-head','h-body','h-larm','h-rarm','h-lleg','h-rleg'];
let word, guessed, wrong, gameOver;
let usedWords = new Set();
let newGameTimeouts = [];

let lastAnnouncement = '';

function announce(msg, ttsDelay = 500, liveDelay = 500) {
  const trimmed = msg.trim();
  lastAnnouncement = trimmed;
  const sr = document.getElementById('announce');
  const visual = document.getElementById('announce-visual');
  // Σβήνουμε πρώτα το περιεχόμενο
  sr.textContent = '';
  visual.textContent = '';
  // TTS — ξεχωριστή καθυστέρηση
  // Αποθηκεύουμε IDs ώστε να μπορούν να ακυρωθούν από τη guess() αν ο παίκτης πατήσει γράμμα
  newGameTimeouts.push(setTimeout(() => speak(trimmed), ttsDelay));
  // Live region — ξεχωριστή καθυστέρηση
  newGameTimeouts.push(setTimeout(() => {
    sr.textContent = trimmed;
    visual.textContent = trimmed;
  }, liveDelay));
}

// ── Τύπος Πληκτρολογίου ────────────────────────────────────────────────────
let kbType = localStorage.getItem('hangman_kbtype') || 'buttons';

function selectKbType(val, silent = false) {
  if (!silent) soundTick();
  kbType = val;
  localStorage.setItem('hangman_kbtype', val);
  document.querySelectorAll('[data-kbtype]').forEach(btn => {
    const isActive = btn.dataset.kbtype === val;
    btn.setAttribute('aria-checked', String(isActive));
    const stateEl = btn.querySelector('.toggle-state-label');
    if (stateEl) stateEl.textContent = isActive ? 'Ενεργό' : 'Ανενεργό';
  });
  applyKbType();
}

function applyKbType() {
  const kb   = document.getElementById('keyboard');
  const wrap = document.getElementById('touch-input-wrap');
  if (!kb || !wrap) return;
  if (kbType === 'touch') {
    kb.style.display = 'none';
    wrap.classList.add('visible');
  } else {
    kb.style.display = '';
    wrap.classList.remove('visible');
  }
}

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  'ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩ'.split('').forEach(letter => {
    const btn = document.createElement('button');
    btn.className = 'key-btn';
    btn.id = 'key-' + letter;
    btn.type = 'button';
    btn.textContent = letter;
    btn.setAttribute('aria-label', letter);
    btn.onclick = () => guess(letter);
    kb.appendChild(btn);
  });
}

function renderWord() {
  const visualText = word.split('').map(ch => {
    if (ch === ' ') return '  ';
    return guessed.has(ch) ? ch : '_';
  }).join(' ');
  document.getElementById('word-display').textContent = visualText;

  const srText = word.split('').map(ch => {
    if (ch === ' ') return 'διάστημα';
    return guessed.has(ch) ? ch : 'κενό';
  }).join(', ');
  document.getElementById('sr-word-display').textContent = srText;
}

const HANGMAN_PARTS_DESC = [
  'Περιγραφή εικόνας: Φαίνεται μία κρεμάλα άδεια.',
  'Περιγραφή εικόνας: Φαίνεται το κεφάλι του ανθρώπου στην κρεμάλα.',
  'Περιγραφή εικόνας: Φαίνονται το κεφάλι και το κορμί.',
  'Περιγραφή εικόνας: Φαίνονται το κεφάλι, το κορμί και ένα χέρι.',
  'Περιγραφή εικόνας: Φαίνονται το κεφάλι, το κορμί και τα δύο χέρια.',
  'Περιγραφή εικόνας: Ο άνθρωπος φαίνεται σχεδόν ολόκληρος, λείπει ένα πόδι.',
  'Περιγραφή εικόνας: Ο άνθρωπος φαίνεται ολόκληρος στην κρεμάλα.',
];

function renderHangman() {
  BODY_PARTS.forEach((id, i) => {
    const el = document.getElementById(id);
    const threshold = Math.round((i + 1) * maxWrong / 6);
    if (wrong >= threshold) el.classList.add('visible');
    else el.classList.remove('visible');
  });
  const partIdx = Math.round((wrong / maxWrong) * 6);
  const desc = (wrong === 0 || wrong >= maxWrong)
    ? HANGMAN_PARTS_DESC[Math.min(partIdx, 6)]
    : wrong + ' από ' + maxWrong + ' λάθη. ' + HANGMAN_PARTS_DESC[Math.min(partIdx, 6)];
  // Ενημέρωση προσβάσιμης περιγραφής κρεμάλας (sr-only div)
  const hangmanSrDesc = document.getElementById('hangman-sr-desc');
  if (hangmanSrDesc) hangmanSrDesc.setAttribute('aria-label', desc);
}

function guess(letter, fromTouch = false) {
  // Καθυστερήσεις πληκτρολογίου αφής
  const TOUCH_GUESS_TTS_DELAY  = 100; // ms — TTS για γράμματα από αφή
  const TOUCH_GUESS_LIVE_DELAY = 100; // ms — live region για γράμματα από αφή
  // Καθυστερήσεις φυσικού πληκτρολογίου
  const HW_GUESS_TTS_DELAY     = 100; // ms — TTS για γράμματα από φυσικό πληκτρολόγιο
  const HW_GUESS_LIVE_DELAY    = 100; // ms — live region για γράμματα από φυσικό πληκτρολόγιο
  const tts  = fromTouch ? TOUCH_GUESS_TTS_DELAY  : HW_GUESS_TTS_DELAY;
  const live = fromTouch ? TOUCH_GUESS_LIVE_DELAY : HW_GUESS_LIVE_DELAY;
  if (gameOver) return;
  if (guessed.has(letter)) { announce(letter + ", απενεργοποιημένο", tts, live); return; }
  const btn = document.getElementById('key-' + letter);
  if (!btn || btn.getAttribute('aria-disabled') === 'true') return;

  // Bounce animation στο κουμπί
  btn.classList.remove('bounce');
  void btn.offsetWidth; // reflow για επανεκκίνηση animation
  btn.classList.add('bounce');
  btn.addEventListener('animationend', () => btn.classList.remove('bounce'), { once: true });

  // Ακύρωση τυχόν εκκρεμών ανακοινώσεων νέου παιχνιδιού
  newGameTimeouts.forEach(t => clearTimeout(t));
  newGameTimeouts = [];

  guessed.add(letter);

  // Για TalkBack: μεταφορά focus στο live region ώστε να μη διαβαστεί το κουμπί
  // Εξαίρεση: αν τελειώνει το παιχνίδι, το disableAll αναλαμβάνει το focus
  const allFoundCheck  = word.split('').every(ch => ch === ' ' || guessed.has(ch));
  const wrongCheck     = !word.includes(letter) && (wrong + 1) >= maxWrong;
  const gameEndingNow  = allFoundCheck || wrongCheck;
  if (!fromTouch && isTalkBack() && !gameEndingNow) {
    const ann = document.getElementById('announce');
    if (ann) ann.focus();
  }

  // Αποκάλυψη κατηγορίας μετά την πρώτη κίνηση
  if (guessed.size === 1) {
    const catEl = document.getElementById('category-label');
    catEl.removeAttribute('aria-hidden');
    catEl.setAttribute('tabindex', '0');
  }

  if (word.includes(letter)) {
    soundCorrect();
    btn.classList.add('correct');
    setTimeout(() => btn.setAttribute('aria-disabled', 'true'), 600);
    // Ενημερώνουμε το aria-label ΜΕΤΑ την ανακοίνωση
    // ώστε κατά το κλικ ο αναγνώστης να ακούει μόνο το live region
    renderWord();

    const allFound = word.split('').every(ch => ch === ' ' || guessed.has(ch));
    if (allFound) {
      gameOver = true;
      soundWin();
      document.getElementById('word-display').classList.add('word-found');
      const s = document.getElementById('status-live');
      s.textContent = '🎉 Νίκη! Βρήκες τη λέξη!';
      s.className = 'win';
      const quipWin = quipsEnabled ? ' ' + randomQuip('win') : '';
      announce(`Νίκη! Η λέξη ήταν ${word}. Μπράβο! ${quipWin}`.trim() + '.', 500, 500);

      document.getElementById('category-label').setAttribute('aria-hidden', 'true');
      document.getElementById('category-label').setAttribute('tabindex', '-1');
      disableAll();
      btn.setAttribute('aria-label', `${letter}, σωστό`);
    } else {
      const positions = [];
      for (let i = 0; i < word.length; i++) {
        if (word[i] === letter) positions.push(i + 1);
      }
      const posText = positions.length === 1
        ? `στη θέση ${positions[0]}`
        : positions.length === 2
          ? `στις θέσεις ${positions[0]} και ${positions[1]}`
          : `στις θέσεις ${positions.slice(0,-1).join(', ')} και ${positions[positions.length-1]}`;

      const wordState = posInfoEnabled ? wordStateForAnnounce() : '';
      const msg = posInfoEnabled
        ? `${letter} ${posText}. ${wordState}.`
        : `${letter} σωστό.`;
      announce(msg, tts, live);
      btn.setAttribute('aria-label', `${letter}, σωστό`);
    }
  } else {
    wrong++;
    soundWrong();
    btn.classList.add('wrong');
    setTimeout(() => btn.setAttribute('aria-disabled', 'true'), 600);
    document.getElementById('wrong-count').textContent = wrong;

    // Shake κρεμάλα
    const hw = document.querySelector('.hangman-wrap');
    hw.classList.remove('shake');
    void hw.offsetWidth;
    hw.classList.add('shake');
    hw.addEventListener('animationend', () => hw.classList.remove('shake'), { once: true });

    // Pop animation στον μετρητή λαθών
    const wc = document.getElementById('wrong-count');
    wc.classList.remove('pop');
    void wc.offsetWidth;
    wc.classList.add('pop');
    wc.addEventListener('animationend', () => wc.classList.remove('pop'), { once: true });

    renderHangman();

    if (wrong >= maxWrong) {
      gameOver = true;
      soundLose();
      const s = document.getElementById('status-live');
      s.textContent = `💀 Ηττήθηκες! Η λέξη ήταν: ${word}`;
      s.className = 'lose';
      const quipLose = quipsEnabled ? ' ' + randomQuip('lose') : '';
      announce(`Ηττήθηκες! Η σωστή λέξη ήταν ${word}. ${quipLose}`.trim() + '.', 500, 500);

      document.getElementById('category-label').setAttribute('aria-hidden', 'true');
      document.getElementById('category-label').setAttribute('tabindex', '-1');
      word.split('').forEach(ch => { if(ch !== ' ') guessed.add(ch); });
      renderWord();
      disableAll();
      btn.setAttribute('aria-label', `${letter}, λάθος`);
    } else {
      const remaining = maxWrong - wrong;
      const quipWrong = quipsEnabled ? ' ' + randomQuip('wrong') : '';
      announce(`Το ${letter} δεν υπάρχει. ${remainingToPhrase(remaining)}. ${quipWrong}`.trim() + '.', tts, live);
      btn.setAttribute('aria-label', `${letter}, λάθος`);
    }
  }
}

function disableAll() {
  // Κλείσιμο μενού ρυθμίσεων αν είναι ανοιχτό κατά τη λήξη παιχνιδιού
  const gMenu = document.getElementById('settings-menu');
  const gBtn  = document.getElementById('settings-btn');
  if (gMenu && !gMenu.hidden) {
    gMenu.hidden = true;
    gMenu.setAttribute('aria-hidden', 'true');
    if (gBtn) gBtn.setAttribute('aria-expanded', 'false');
    updateSettingsBtnText();
  }
  setTimeout(() => {
    const kb = document.getElementById('keyboard');
    if (kb) { kb.hidden = true; kb.setAttribute('aria-hidden', 'true'); kb.setAttribute('inert', ''); }
    // Απόκρυψη λέξης από αναγνώστη οθόνης στο τέλος
    const srWord = document.getElementById('sr-word-display');
    srWord.textContent = '';
    srWord.setAttribute('aria-hidden', 'true');
    // Εμφάνιση κουμπιών τέλους παιχνιδιού
    const btnNew = document.getElementById('btn-new');
    const btnHome = document.getElementById('btn-home');
    const btnClose = document.getElementById('btn-close-game');
    btnNew.hidden = false;   btnNew.removeAttribute('aria-hidden');  btnNew.removeAttribute('tabindex');
    btnHome.hidden = false;  btnHome.removeAttribute('aria-hidden');   btnHome.removeAttribute('tabindex');
    btnClose.hidden = false; btnClose.removeAttribute('aria-hidden'); btnClose.removeAttribute('tabindex');


    // Απόκρυψη touch input
    const _tw = document.getElementById('touch-input-wrap');
    const _ti = document.getElementById('touch-letter-input');
    if (_tw) { _tw.setAttribute('aria-hidden', 'true'); _tw.setAttribute('inert', ''); _tw.classList.remove('visible'); }
    if (_ti) { _ti.disabled = true; }

    // Εστίαση στο live region για TalkBack στο τέλος παιχνιδιού
    setTimeout(() => {
      const ann = document.getElementById('announce');
      if (ann && isTalkBack()) ann.focus();
    }, 500);

  }, 500);
}

function updateCategoryLabel(category, wordLen, hint) {
  const base = 'Κατηγορία: ' + category + '. Η λέξη έχει ' + numToGreek(wordLen) + ' γράμματα.';
  const full = (hintEnabled && hint) ? base + ' Υπόδειξη: ' + hint : base;
  document.getElementById('category-label').textContent = full;
}

const GREEK_NUMS = ['μηδέν','ένα','δύο','τρία','τέσσερα','πέντε','έξι','επτά','οκτώ','εννέα',
  'δέκα','έντεκα','δώδεκα','δεκατρία','δεκατέσσερα','δεκαπέντε',
  'δεκαέξι','δεκαεπτά','δεκαοκτώ','δεκαεννέα','είκοσι'];
function numToGreek(n) { return (n >= 0 && n <= 20) ? GREEK_NUMS[n] : String(n); }

const GREEK_ORDINALS = ['','Πρώτη','Δεύτερη','Τρίτη','Τέταρτη','Πέμπτη','Έκτη','Έβδομη','Όγδοη','Ένατη','Δέκατη',
  'Ενδέκατη','Δωδέκατη','Δέκατη τρίτη','Δέκατη τέταρτη','Δέκατη πέμπτη',
  'Δέκατη έκτη','Δέκατη έβδομη','Δέκατη όγδοη','Δέκατη ένατη','Εικοστή'];
function numToGreekOrdinal(n) { return (n >= 1 && n <= 20) ? GREEK_ORDINALS[n] : n + 'η'; }

function newGame() {
  // Επιλογή λέξης χωρίς επανάληψη — αν έχουν χρησιμοποιηθεί όλες, μηδενισμός
  const pool = getFilteredWords();
  if (usedWords.size >= pool.length) usedWords.clear();
  const available = pool.filter(e => !usedWords.has(e.word));
  const entry = available[Math.floor(Math.random() * available.length)];
  usedWords.add(entry.word);
  word = entry.word;
  guessed = new Set();
  wrong = 0;
  gameOver = false;

  // Απόκρυψη κουμπιών κατά τη διάρκεια του παιχνιδιού
  const _btnNew = document.getElementById('btn-new');
  const _btnHome = document.getElementById('btn-home');
  const _btnClose = document.getElementById('btn-close-game');
  _btnNew.hidden = true;   _btnNew.setAttribute('aria-hidden', 'true');  _btnNew.setAttribute('tabindex', '-1');
  _btnHome.hidden = true;  _btnHome.setAttribute('aria-hidden', 'true');   _btnHome.setAttribute('tabindex', '-1');
  _btnClose.hidden = true; _btnClose.setAttribute('aria-hidden', 'true'); _btnClose.setAttribute('tabindex', '-1');
  const kb = document.getElementById('keyboard');
  if (kb) { kb.hidden = false; kb.removeAttribute('aria-hidden'); kb.removeAttribute('inert'); }
  const _tw = document.getElementById('touch-input-wrap');
  const _ti = document.getElementById('touch-letter-input');
  if (_tw) { _tw.removeAttribute('aria-hidden'); _tw.removeAttribute('inert'); }
  if (_ti) { _ti.disabled = false; _ti.value = ''; }

  document.getElementById('wrong-count').textContent = '0';
  document.getElementById('max-wrong-display').textContent = maxWrong;
  document.getElementById('word-display').classList.remove('word-found');
  const srWordEl = document.getElementById('sr-word-display');
  srWordEl.textContent = '';
  srWordEl.removeAttribute('aria-hidden');
  updateCategoryLabel(entry.category, entry.word.replace(/ /g,'').length, entry.hint);
  const catEl = document.getElementById('category-label');
  catEl.setAttribute('aria-hidden', 'true');
  catEl.setAttribute('tabindex', '-1');
  document.getElementById('hint-text').textContent = 'Υπόδειξη: ' + entry.hint;
  const hintBox = document.getElementById('hint-box');
  if (hintEnabled) {
    hintBox.style.display = '';
  } else {
    hintBox.style.display = 'none';
  }
  document.getElementById('status-live').textContent = '';
  document.getElementById('status-live').className = '';

  document.querySelectorAll('#keyboard .key-btn').forEach(btn => {
    btn.removeAttribute('aria-disabled');
    btn.className = 'key-btn';
    btn.setAttribute('aria-label', btn.textContent);
  });

  renderHangman();
  renderWord();
  applyKbType();

  const len = word.replace(/ /g,'').length;
  soundNewGame();

  newGameTimeouts = [];
  const hintMsg = hintEnabled ? `. Υπόδειξη: ${entry.hint}.` : '';
  const quipStart = quipsEnabled ? ' ' + randomQuip('start') : '';
  const fullMsg = `Νέο παιχνίδι! Κατηγορία: ${entry.category}. Η λέξη έχει ${numToGreek(len)} γράμματα.${hintMsg}${quipStart}`;
  // TTS: ttsDelay=500ms, live region: liveDelay=500ms (ρυθμίζονται μέσω announce)
  announce(fullMsg, 500, 500);

  // Εστίαση στο live region αν ξεκινά νέο παιχνίδι εντός οθόνης παιχνιδιού
  const ss = document.getElementById('start-screen');
  if (ss && ss.hidden) {
    setTimeout(() => {
      const ann = document.getElementById('announce');
      if (ann && isTalkBack()) ann.focus();
    }, 500);
  }

}

// Πληκτρολόγιο υλικού
document.addEventListener('keydown', e => {
  // Βοηθητική: αποκλεισμός κουμπιών/links/checkboxes αλλά ΟΧΙ του touch-letter-input
  function isNonInputInteractive() {
    const el = document.activeElement;
    if (!el) return false;
    if (el.id === 'touch-letter-input') return false;
    const tag = el.tagName;
    const role = el.getAttribute('role') || '';
    return ['BUTTON', 'SELECT', 'TEXTAREA', 'A'].includes(tag)
      || ['button', 'link', 'checkbox', 'switch', 'menuitem'].includes(role);
  }

  // Αριθμός 1 — επανάληψη τελευταίου μηνύματος
  if (e.key === '1' && lastAnnouncement && !isNonInputInteractive()) {
    e.preventDefault();
    const sr1kd = document.getElementById('announce');
    const vis1kd = document.getElementById('announce-visual');
    sr1kd.textContent = ''; vis1kd.textContent = '';
    stopSpeech();
    setTimeout(() => speak(lastAnnouncement),150);
    setTimeout(() => { sr1kd.textContent = lastAnnouncement; vis1kd.textContent = lastAnnouncement; },150);
    return;
  }

  // Αριθμός 2 — ανάγνωση κατάστασης κρεμάλας
  if (e.key === '2' && !isNonInputInteractive()) {
    const gs = document.getElementById('game-screen');
    if (gs && !gs.hidden) {
      e.preventDefault();
      const hangmanSrDesc = document.getElementById('hangman-sr-desc');
      const desc = hangmanSrDesc ? hangmanSrDesc.getAttribute('aria-label') : '';
      if (desc) {
        const sr2kd = document.getElementById('announce');
        const vis2kd = document.getElementById('announce-visual');
        sr2kd.textContent = ''; vis2kd.textContent = '';
        lastAnnouncement = desc;
        stopSpeech();
        setTimeout(() => speak(desc),150);
        setTimeout(() => { sr2kd.textContent = desc; vis2kd.textContent = desc; },150);
      }
      return;
    }
  }

  // Αριθμός 3 — πληροφορίες λέξης (κατηγορία + αριθμός γραμμάτων)
  if (e.key === '3' && !isNonInputInteractive()) {
    if (!(document.activeElement && document.activeElement.id === 'touch-letter-input')) {
      const gs = document.getElementById('game-screen');
      if (gs && !gs.hidden && word) {
        e.preventDefault();
        const entry = WORDS.find(en => en.word === word);
        const category = entry ? entry.category : '';
        const wordLen = word.replace(/ /g, '').length;
        const msg = category
          ? category + '. Η λέξη αποτελείται από ' + numToGreek(wordLen) + ' γράμματα.'
          : 'Η λέξη αποτελείται από ' + numToGreek(wordLen) + ' γράμματα.';
        const sr3kd = document.getElementById('announce');
        const vis3kd = document.getElementById('announce-visual');
        sr3kd.textContent = ''; vis3kd.textContent = '';
        lastAnnouncement = msg;
        stopSpeech();
        setTimeout(() => speak(msg),150);
        setTimeout(() => { sr3kd.textContent = msg; vis3kd.textContent = msg; },150);
        return;
      }
    }
  }
  const letter = e.key.toUpperCase();
  const GREEK = 'ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩ';
  if (GREEK.includes(letter)) {
    // Αν το focus είναι στο touch input, η guess() θα κληθεί από τον input listener
    if (document.activeElement && document.activeElement.id === 'touch-letter-input') return;
    const btn = document.getElementById(`key-${letter}`);
    if (btn && btn.getAttribute('aria-disabled') !== 'true') guess(letter);
  }
});

// ── Αρχική Οθόνη ─────────────────────────────────────────────
let selectedDifficulty = 'medium';
let selectedCategory   = 'all';
let selectedGame       = 'kremala';
let maxWrong = 6;

// Γέμισμα select κατηγοριών
function buildCategorySelect(forceGame) {
  const game = forceGame || selectedGame || 'kremala';
  const dataSource = game === 'sosto-lathos' ? QUESTIONS : WORDS;
  const itemKey = game === 'sosto-lathos' ? 'question' : 'word';

  const cats = [...new Set(dataSource.map(w => w.category))].sort((a,b) => a.localeCompare(b,'el'));
  const counts = {};
  dataSource.forEach(w => { counts[w.category] = (counts[w.category] || 0) + 1; });
  const totalItems = dataSource.length;
  const itemWord = game === 'sosto-lathos' ? 'ερωτήσεις' : 'λέξεις';

  const box = document.getElementById('category-checkboxes');
  box.innerHTML = '';

  // Πρώτο checkbox: "Όλες οι κατηγορίες" — αποεπιλέγει τις υπόλοιπες
  const allRow = document.createElement('div');
  allRow.className = 'cat-checkbox-row';
  const allCb = document.createElement('input');
  allCb.type = 'checkbox'; allCb.id = 'cb-all'; allCb.value = 'all';
  allCb.addEventListener('change', () => {
    soundTick();
    if (allCb.checked) {
      box.querySelectorAll('input:not(#cb-all)').forEach(cb => { cb.checked = false; });
    }
    saveCategorySelection();
    updateCategoryBtnText();
  });
  const allLbl = document.createElement('label');
  allLbl.htmlFor = 'cb-all';
  allLbl.textContent = 'Όλες οι κατηγορίες, ' + totalItems + ' ' + itemWord;
  allRow.appendChild(allCb); allRow.appendChild(allLbl);
  box.appendChild(allRow);

  // Φόρτωση αποθηκευμένης επιλογής (ή προεπιλογή: "Όλες")
  const savedCats = loadCategorySelection();

  // Checkboxes κατηγοριών — αποεπιλέγουν το "Όλες"
  cats.forEach(c => {
    const row = document.createElement('div');
    row.className = 'cat-checkbox-row';
    const id = 'cb-' + c;
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.id = id; cb.value = c; cb.name = 'category';
    cb.addEventListener('change', () => {
      soundTick();
      document.getElementById('cb-all').checked = false;
      saveCategorySelection();
      updateCategoryBtnText();
    });
    const lbl = document.createElement('label');
    lbl.htmlFor = id;
    lbl.textContent = c + ', ' + counts[c] + ' ' + itemWord;
    row.appendChild(cb); row.appendChild(lbl);
    box.appendChild(row);
  });

  // Εφαρμογή αποθηκευμένων επιλογών
  if (savedCats === null || savedCats === 'all') {
    allCb.checked = true;
  } else {
    savedCats.forEach(c => {
      const cb = document.getElementById('cb-' + c);
      if (cb) cb.checked = true;
    });
  }
  // Κουμπί κλεισίματος πάντα στο τέλος
  const closeBtn = document.createElement('button');
  closeBtn.className = 'menu-close-btn';
  closeBtn.textContent = '✕ Κλείσιμο μενού';
  closeBtn.addEventListener('click', closeCategoryMenu);
  box.appendChild(closeBtn);

  updateCategoryBtnText();
}

function saveCategorySelection() {
  const allCb = document.getElementById('cb-all');
  if (allCb && allCb.checked) {
    localStorage.setItem('hangman_categories', 'all');
  } else {
    const checked = [...document.querySelectorAll('#category-checkboxes input:checked:not(#cb-all)')].map(cb => cb.value);
    localStorage.setItem('hangman_categories', JSON.stringify(checked));
  }
}

function loadCategorySelection() {
  try {
    const saved = localStorage.getItem('hangman_categories');
    if (!saved || saved === 'all') { selectedCategory = 'all'; return 'all'; }
    const parsed = JSON.parse(saved);
    selectedCategory = parsed;
    return parsed;
  } catch(e) { selectedCategory = 'all'; return 'all'; }
}

function toggleCategoryMenu() {
  soundShort();
  const btn  = document.getElementById('category-btn');
  const menu = document.getElementById('category-checkboxes');
  const open = menu.hidden;
  menu.hidden = !open;
  menu.setAttribute('aria-hidden', String(!open));
  btn.setAttribute('aria-expanded', String(open));
  updateCategoryBtnText();
  if (open) document.getElementById('cb-all').focus();
}

function updateCategoryBtnText() {
  const btn = document.getElementById('category-btn');
  const menu = document.getElementById('category-checkboxes');
  const isOpen = !menu.hidden;

  const game = selectedGame || 'kremala';
  const dataSource = game === 'sosto-lathos' ? QUESTIONS : WORDS;
  const itemWord = game === 'sosto-lathos' ? 'ερωτήσεις' : 'λέξεις';

  const counts = {};
  dataSource.forEach(w => { counts[w.category] = (counts[w.category] || 0) + 1; });
  const totalItems = dataSource.length;

  const allCb = document.getElementById('cb-all');
  const checked = [...document.querySelectorAll('#category-checkboxes input:checked:not(#cb-all)')];

  let text = '';
  if (!allCb || allCb.checked || checked.length === 0) {
    text = 'Όλες οι κατηγορίες, ' + totalItems + ' ' + itemWord;
  } else if (checked.length === 1) {
    const cat = checked[0].value;
    text = 'Επιλεγμένη: ' + cat + ', ' + counts[cat] + ' ' + itemWord;
  } else {
    const names = checked.map(cb => cb.value).join(', ');
    const total = checked.reduce((sum, cb) => sum + (counts[cb.value] || 0), 0);
    text = 'Επιλεγμένες: ' + names + ', ' + total + ' ' + itemWord;
  }
  const arrowSpan = document.getElementById('category-btn-arrow');
  const catBtn    = document.getElementById('category-btn');
  const catText   = document.getElementById('category-btn-text');
  if (arrowSpan) arrowSpan.textContent = isOpen ? '▲' : '▼';
  if (catText)   catText.textContent = '📚 ' + text;
  if (catBtn)    catBtn.setAttribute('aria-label', 'Κατηγορίες: ' + text);
}

// Διακόπτες αρχικής οθόνης
function updateSettingsBtnText() {
  const isKremala = selectedGame !== 'sosto-lathos';

  // Ρυθμίσεις που εμφανίζονται μόνο στην Κρεμάλα
  const kremalaOnly = ['Υποδείξεις λέξεων', 'Περιγραφή θέσεις σωστών γραμμάτων και κενών', 'Ατάκες παιχνιδιού',
                       'Πληκτρολόγιο με κουμπιά', 'Πληκτρολόγιο αφής'];

  const defaultOff = ['Φωνητική καθοδήγηση', 'Υποδείξεις λέξεων', 'Ατάκες παιχνιδιού',
                      'Πληκτρολόγιο αφής',
                      'Μαύρο φόντο με λευκά γράμματα', 'Λευκό φόντο με μαύρα γράμματα',
                      'Μεγάλη γραμματοσειρά', 'Πολύ μεγάλη γραμματοσειρά'];
  const defaultOn  = ['Ήχοι', 'Περιγραφή θέσεις σωστών γραμμάτων και κενών',
                      'Πληκτρολόγιο με κουμπιά', 'Προεπιλεγμένη εμφάνιση',
                      'Κανονικό μέγεθος γραμματοσειράς'];

  // Χτίζουμε label ΜΙΑ ΦΟΡΑ από το start-settings-menu (πάντα στο DOM)
  // και το εφαρμόζουμε και στα δύο κουμπιά ταυτόχρονα
  const parts = [];
  const changed = [];
  document.querySelectorAll('#start-settings-menu [role="switch"]').forEach(btn => {
    const label = btn.getAttribute('aria-label') || '';
    if (!label) return;
    if (!isKremala && kremalaOnly.includes(label)) return;
    const checked = btn.getAttribute('aria-checked') === 'true';
    if (checked) parts.push(label);
    if (defaultOn.includes(label)  && !checked) changed.push('Χωρίς ' + label);
    if (defaultOff.includes(label) &&  checked) changed.push(label);
  });

  const fullLabel = parts.length > 0
    ? 'Γενικές ρυθμίσεις: Επιλεγμένες, ' + parts.join(', ')
    : 'Γενικές ρυθμίσεις';
  const visualText = changed.length > 0
    ? '⚙️ Γενικές ρυθμίσεις: ' + changed.join(' · ')
    : '⚙️ Γενικές ρυθμίσεις';

  // Εφαρμογή σε όλα τα κουμπιά γενικών ρυθμίσεων ταυτόχρονα
  document.querySelectorAll('.settings-trigger-btn').forEach(btn => {
    btn.setAttribute('aria-label', fullLabel);
  });
  // Οπτικό κείμενο
  ['start-settings-btn-text', 'game-shared-settings-btn-text', 'sl-shared-settings-btn-text'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = visualText;
  });
  // Βέλη
  const sMenu  = document.getElementById('start-settings-menu');
  const isMenuOpen = sMenu && !sMenu.hidden;
  document.querySelectorAll('.settings-trigger-arrow').forEach(el => {
    el.textContent = isMenuOpen ? '▲' : '▼';
  });
}

function applyTheme(val) {
  document.documentElement.classList.remove('theme-dark', 'theme-light');
  if (val === 'dark')  document.documentElement.classList.add('theme-dark');
  else if (val === 'light') document.documentElement.classList.add('theme-light');
  localStorage.setItem('hangman_theme', val);
}

function selectTheme(val, silent = false) {
  if (!silent) soundTick();
  applyTheme(val);
  const themes = ['default', 'dark', 'light'];
  themes.forEach(t => {
    // Αρχική οθόνη toggles
    const btn   = document.getElementById('theme-' + t + '-toggle');
    const state = document.getElementById('theme-' + t + '-state');
    if (btn)   btn.setAttribute('aria-checked', String(t === val));
    if (state) state.textContent = t === val ? (t === 'default' ? 'Ενεργή' : 'Ενεργό') : (t === 'default' ? 'Ανενεργή' : 'Ανενεργό');
    // Παιχνίδι toggles
    const gBtn   = document.getElementById('game-theme-' + t + '-toggle');
    const gState = document.getElementById('game-theme-' + t + '-state');
    if (gBtn)   gBtn.setAttribute('aria-checked', String(t === val));
    if (gState) gState.textContent = t === val ? (t === 'default' ? 'Ενεργή' : 'Ενεργό') : (t === 'default' ? 'Ανενεργή' : 'Ανενεργό');
  });
}

function loadTheme() {
  const saved = localStorage.getItem('hangman_theme') || 'default';
  selectTheme(saved, true);
}

function selectFont(val, silent = false) {
  if (!silent) soundTick();
  document.documentElement.classList.remove('font-large', 'font-xlarge');
  if (val === 'large')  document.documentElement.classList.add('font-large');
  if (val === 'xlarge') document.documentElement.classList.add('font-xlarge');
  localStorage.setItem('hangman_font', val);
  const fonts = ['normal', 'large', 'xlarge'];
  fonts.forEach(f => {
    const active = f === val;
    const state = active ? 'Ενεργή' : 'Ανενεργή';
    const sBtn  = document.getElementById('font-' + f + '-toggle');
    const sState = document.getElementById('font-' + f + '-state');
    if (sBtn)   sBtn.setAttribute('aria-checked', String(active));
    if (sState) sState.textContent = state;
    const gBtn  = document.getElementById('game-font-' + f + '-toggle');
    const gState = document.getElementById('game-font-' + f + '-state');
    if (gBtn)   gBtn.setAttribute('aria-checked', String(active));
    if (gState) gState.textContent = state;
  });
}

function loadFont() {
  const saved = localStorage.getItem('hangman_font') || 'normal';
  selectFont(saved, true);
}

function startGame() {
  // Σύμπτυξη όλων των ανοιχτών μενού
  collapseAllMenus();
  // Τιμές από custom pickers (ήδη αποθηκευμένες στις μεταβλητές)
  localStorage.setItem('hangman_difficulty', selectedDifficulty);
  localStorage.setItem('hangman_maxwrong', String(maxWrong));
  const allCb = document.getElementById('cb-all');
  if (allCb && allCb.checked) {
    selectedCategory = 'all';
  } else {
    const checked = [...document.querySelectorAll('#category-checkboxes input:checked:not(#cb-all)')].map(cb => cb.value);
    selectedCategory = checked.length > 0 ? checked : 'all';
  }

  // Κρύβουμε αρχική οθόνη
  const ss = document.getElementById('start-screen');
  ss.hidden = true;
  ss.setAttribute('aria-hidden', 'true');

  // Δρομολόγηση ανάλογα με το επιλεγμένο παιχνίδι
  const currentGame = selectedGame || 'kremala';

  if (currentGame === 'sosto-lathos') {
    const sl = document.getElementById('sosto-lathos-screen');
    sl.hidden = false;
    sl.removeAttribute('aria-hidden');
    document.title = 'Σωστό ή λάθος';
    slNewGame();
    setTimeout(() => {
      const ann = document.getElementById('sl-announce');
      if (ann && isTalkBack()) ann.focus();
    }, 500);
  } else {
    // Ενημερώνουμε info-bar max
    document.getElementById('wrong-count').textContent = '0';

    // Εμφανίζουμε το παιχνίδι Κρεμάλα
    const gs = document.getElementById('game-screen');
    gs.hidden = false;
    gs.removeAttribute('aria-hidden');
    document.title = 'Κρεμάλα';

    // Εστίαση στο live region στα 400ms
    setTimeout(() => {
      const ann = document.getElementById('announce');
      if (ann && isTalkBack()) ann.focus();
    }, 500);
    newGame();
  }
}

// ── Λογική παιχνιδιού "Σωστό ή Λάθος" ──────────────────────────
let slQuestions = [];
let slCurrentIndex = 0;
let slScoreCorrect = 0;
let slScoreWrong = 0;
let slAnswered = false;

function slAnnounce(msg) {
  const live = document.getElementById('sl-announce');
  if (!live) return;
  live.textContent = '';
  setTimeout(() => { live.textContent = msg; }, 50);
}

function slNewGame() {
  soundNewGame();
  // Φιλτράρισμα ερωτήσεων βάσει κατηγορίας
  let pool = QUESTIONS;
  if (selectedCategory !== 'all' && Array.isArray(selectedCategory) && selectedCategory.length > 0) {
    const filtered = pool.filter(q => selectedCategory.includes(q.category));
    if (filtered.length > 0) pool = filtered;
  }
  // Τυχαία σειρά
  slQuestions = [...pool].sort(() => Math.random() - 0.5);
  slCurrentIndex = 0;
  slScoreCorrect = 0;
  slScoreWrong = 0;
  slAnswered = false;

  document.getElementById('sl-score-correct').textContent = '0';
  document.getElementById('sl-score-wrong').textContent = '0';
  document.getElementById('sl-question-total').textContent = slQuestions.length;

  // Κρύψε κουμπιά τέλους
  ['sl-btn-new','sl-btn-home','sl-btn-close'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.hidden = true; el.setAttribute('aria-hidden', 'true'); }
  });

  // Εμφάνισε κουμπιά απάντησης
  const answerBtns = document.getElementById('sl-answer-btns');
  answerBtns.hidden = false;
  answerBtns.removeAttribute('aria-hidden');
  document.getElementById('sl-btn-true').disabled = false;
  document.getElementById('sl-btn-false').disabled = false;

  document.getElementById('sl-result-visual').textContent = '';

  // Εστίαση στο live region αν ξεκινά νέο παιχνίδι εντός οθόνης (όπως Κρεμάλα)
  const ss = document.getElementById('start-screen');
  if (ss && ss.hidden) {
    const talkback = isTalkBack();
    const ann = document.getElementById('sl-announce');
    if (talkback && ann) {
      setTimeout(() => { ann.focus(); }, 500);
    }
  }

  slShowQuestion();
}

function slShowQuestion() {
  if (slCurrentIndex >= slQuestions.length) {
    slEndGame();
    return;
  }
  slAnswered = false;
  const q = slQuestions[slCurrentIndex];

  // Ενημέρωση μετρητή
  document.getElementById('sl-question-num').textContent = slCurrentIndex + 1;

  // Κατηγορία
  document.getElementById('sl-category-label').textContent = q.category;

  // Ερώτηση — οπτικά
  document.getElementById('sl-question-box').textContent = q.question;

  // Καθαρισμός αποτελέσματος
  document.getElementById('sl-result-visual').textContent = '';
  document.getElementById('sl-result-visual').style.borderColor = '';
  document.getElementById('sl-result-visual').style.background = '';

  // Ανακοίνωση + TalkBack focus με το ίδιο pattern της Κρεμάλας:
  // γράφουμε πρώτα στο element, μετά focus ώστε το TalkBack να το διαβάσει
  const announceMsg = numToGreekOrdinal(slCurrentIndex + 1) + ' ερώτηση. Κατηγορία: ' + q.category + '. ' + q.question;
  slAnnounce(announceMsg);

  // Κρύψε κουμπιά τέλους/λάθους
  ['sl-btn-new','sl-btn-home','sl-btn-close'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.hidden = true; el.setAttribute('aria-hidden', 'true'); }
  });

  // Επανεμφάνιση κουμπιών απάντησης
  document.getElementById('sl-btn-true').disabled = false;
  document.getElementById('sl-btn-false').disabled = false;
  const btnNext = document.getElementById('sl-btn-next');
  if (btnNext) { btnNext.hidden = true; btnNext.setAttribute('aria-hidden', 'true'); }

  const talkback = isTalkBack();
  if (talkback && slCurrentIndex > 0) {
    const ann = document.getElementById('sl-announce');
    if (ann) {
      ann.textContent = '';
      setTimeout(() => {
        ann.textContent = announceMsg;
        ann.focus();
      }, 500);
    }
  }
}

function slAnswer(userAnswer) {
  if (slAnswered) return;
  slAnswered = true;

  const q = slQuestions[slCurrentIndex];
  const correct = userAnswer === q.answer;

  // Απενεργοποίηση κουμπιών απάντησης
  document.getElementById('sl-btn-true').disabled = true;
  document.getElementById('sl-btn-false').disabled = true;

  slCurrentIndex++;

  if (correct) {
    soundCorrect && soundCorrect();
    slScoreCorrect++;
    document.getElementById('sl-score-correct').textContent = slScoreCorrect;
    if (slCurrentIndex < slQuestions.length) {
      const talkback = isTalkBack();
      const ann = document.getElementById('sl-announce');
      if (talkback && ann) {
        ann.textContent = '';
        setTimeout(() => {
          ann.textContent = 'Σωστά!';
          ann.focus();
        }, 500);
        setTimeout(() => slShowQuestion(), 900);
      } else {
        slAnnounce('Σωστά!');
        setTimeout(() => slShowQuestion(), 400);
      }
    } else {
      setTimeout(() => slEndGame(), 400);
    }
  } else {
    soundWrong && soundWrong();
    slScoreWrong++;
    document.getElementById('sl-score-wrong').textContent = slScoreWrong;

    // Ελέγχος ρεκόρ
    const prevRecord = parseInt(localStorage.getItem('sl_highscore') || '0', 10);
    const newRecord = slScoreCorrect > prevRecord;
    if (newRecord) localStorage.setItem('sl_highscore', String(slScoreCorrect));

    // Απόκρυψη κουμπιών απάντησης
    const answerBtns = document.getElementById('sl-answer-btns');
    answerBtns.hidden = true;
    answerBtns.setAttribute('aria-hidden', 'true');

    // Εμφάνιση σωστής απάντησης
    const correctText = q.answer ? 'Σωστό ✅' : 'Λάθος ❌';
    const resultBox = document.getElementById('sl-result-visual');
    const explanation = q.explanation || ('Λάθος απάντηση. Η σωστή απάντηση είναι: ' + correctText);
    resultBox.textContent = explanation;
    resultBox.style.borderColor = '#f87171';
    resultBox.style.background = 'rgba(248,113,113,0.08)';

    // Μήνυμα εξήγησης + ρεκόρ αν σπάστηκε
    let announceMsg = explanation;
    if (newRecord && prevRecord > 0) {
      announceMsg += ' Μπράβο! Πέρασες το προσωπικό σου ρεκόρ από ' + prevRecord + ' σε ' + slScoreCorrect + ' σωστές απαντήσεις.';
    } else if (newRecord && prevRecord === 0) {
      announceMsg += ' Νέο ρεκόρ: ' + slScoreCorrect + ' σωστές απαντήσεις!';
    }

    slAnnounce(announceMsg);

    // Εμφάνιση τριών κουμπιών
    ['sl-btn-new','sl-btn-home','sl-btn-close'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.hidden = false; el.removeAttribute('aria-hidden'); }
    });

    const talkback = isTalkBack();
    const ann = document.getElementById('sl-announce');
    if (talkback && ann) {
      ann.textContent = '';
      setTimeout(() => {
        ann.textContent = announceMsg;
        ann.focus();
      }, 500);
    } else {
      setTimeout(() => { document.getElementById('sl-btn-new').focus(); }, 500);
    }
  }
}

function getFilteredWords() {
  let pool = WORDS;
  if (selectedCategory !== 'all' && Array.isArray(selectedCategory) && selectedCategory.length > 0) {
    const filtered = pool.filter(w => selectedCategory.includes(w.category));
    if (filtered.length > 0) pool = filtered;
  }
  if (selectedDifficulty === 'easy') {
    const easy = pool.filter(w => w.word.replace(/ /g,'').length <= 6);
    if (easy.length > 0) pool = easy;
  } else if (selectedDifficulty === 'hard') {
    const hard = pool.filter(w => w.word.replace(/ /g,'').length >= 9);
    if (hard.length > 0) pool = hard;
  }
  return pool;
}

function slEndGame() {
  const total = slQuestions.length;
  const pct = Math.round((slScoreCorrect / total) * 100);

  // Ρεκόρ
  const prevRecord = parseInt(localStorage.getItem('sl_highscore') || '0', 10);
  const newRecord = slScoreCorrect > prevRecord;
  if (newRecord) localStorage.setItem('sl_highscore', String(slScoreCorrect));
  const currentRecord = newRecord ? slScoreCorrect : prevRecord;

  document.getElementById('sl-question-box').textContent =
    'Τέλος παιχνιδιού! Σωστές: ' + slScoreCorrect + '/' + total + ' (' + pct + '%)' +
    (newRecord && prevRecord > 0 ? ' 🏆 Νέο ρεκόρ!' : '');

  // Κρύψε κουμπιά απάντησης
  const answerBtns = document.getElementById('sl-answer-btns');
  answerBtns.hidden = true;
  answerBtns.setAttribute('aria-hidden', 'true');

  // Εμφάνισε τρία κουμπιά
  ['sl-btn-new','sl-btn-home','sl-btn-close'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.hidden = false; el.removeAttribute('aria-hidden'); }
  });

  // Μήνυμα με ρεκόρ
  let msg = 'Τέλος παιχνιδιού! Απαντήσατε σωστά σε ' + slScoreCorrect + ' από ' + total + ' ερωτήσεις, ποσοστό ' + pct + ' τοις εκατό.';
  if (newRecord && prevRecord > 0) {
    msg += ' Μπράβο! Πέρασες το προσωπικό σου ρεκόρ από ' + prevRecord + ' σε ' + slScoreCorrect + ' σωστές απαντήσεις.';
  } else if (newRecord && prevRecord === 0) {
    msg += ' Νέο ρεκόρ: ' + slScoreCorrect + ' σωστές απαντήσεις!';
  } else {
    msg += ' Προσωπικό ρεκόρ: ' + currentRecord + ' σωστές απαντήσεις.';
  }

  document.getElementById('sl-result-visual').textContent = msg;
  document.getElementById('sl-result-visual').style.borderColor = newRecord ? 'var(--accent)' : '';
  document.getElementById('sl-result-visual').style.background = newRecord ? 'rgba(196,168,255,0.08)' : '';

  const talkback = isTalkBack();
  const ann = document.getElementById('sl-announce');
  if (talkback && ann) {
    ann.textContent = '';
    setTimeout(() => {
      ann.textContent = msg;
      ann.focus();
    }, 500);
  } else {
    setTimeout(() => { document.getElementById('sl-btn-new').focus(); }, 500);
  }
}

function togglePickerMenu(id) {
  soundShort();
  const btn  = document.getElementById(id + '-btn');
  const menu = document.getElementById(id + '-menu');
  const open = menu.hidden;
  // Κλείσιμο όλων των άλλων picker menus
  ['difficulty', 'maxwrong'].forEach(pid => {
    if (pid === id) return;
    const m = document.getElementById(pid + '-menu');
    const b = document.getElementById(pid + '-btn');
    if (m && !m.hidden) {
      m.hidden = true;
      m.setAttribute('aria-hidden', 'true');
      if (b) { b.setAttribute('aria-expanded', 'false'); document.getElementById(pid + '-btn-arrow').textContent = '▼'; }
    }
  });
  menu.hidden = !open;
  menu.setAttribute('aria-hidden', String(!open));
  btn.setAttribute('aria-expanded', String(open));
  document.getElementById(id + '-btn-arrow').textContent = open ? '▲' : '▼';
  if (open) {
    // Εστίαση στην επιλεγμένη επιλογή
    const sel = menu.querySelector('.picker-option.selected') || menu.querySelector('.picker-option');
    if (sel) sel.focus();
  }
}

function selectPickerOption(id, value, label) {
  soundTick();
  const menu = document.getElementById(id + '-menu');
  const btn  = document.getElementById(id + '-btn');
  const textSpan = document.getElementById(id + '-btn-text');

  // Ενημέρωση επιλεγμένης επιλογής
  menu.querySelectorAll('.picker-option').forEach(opt => {
    const isSelected = opt.dataset.value === value;
    opt.classList.toggle('selected', isSelected);
    opt.setAttribute('aria-pressed', String(isSelected));
  });

  // Ενημέρωση κουμπιού
  const prefixMap    = { difficulty: 'Επίπεδο δυσκολίας', maxwrong: 'Επιτρεπόμενα λάθη', kbtype: 'Τύπος πληκτρολογίου', games: 'Λίστα παιχνιδιών' };
  const visualPrefix = { difficulty: '🎯 Επίπεδο δυσκολίας', maxwrong: '❌ Επιτρεπόμενα λάθη', kbtype: '⌨️ Τύπος πληκτρολογίου', games: '🎮 Λίστα παιχνιδιών' };
  const prefix = prefixMap[id] || id;
  const vPrefix = visualPrefix[id] || prefix;
  if (textSpan) textSpan.textContent = vPrefix + ': ' + label;
  if (id === 'games') {
    if (btn) btn.setAttribute('aria-label', 'Λίστα παιχνιδιών: Επιλεγμένο, ' + label);
  } else {
    if (btn) btn.setAttribute('aria-label', prefix + ': ' + label);
  }

  // Εφαρμογή της επιλογής — ΠΡΙΝ το κλείσιμο μενού για σωστό aria-pressed
  if (id === 'difficulty') {
    selectedDifficulty = value;
    localStorage.setItem('hangman_difficulty', value);
  } else if (id === 'maxwrong') {
    maxWrong = parseInt(value);
    localStorage.setItem('hangman_maxwrong', String(value));
  } else if (id === 'games') {
    selectedGame = value;
    updateStartScreenForGame(value);
    buildCategorySelect(value);
    localStorage.setItem('hangman_game', value);
  }

  // Κλείσιμο μενού — εστίαση πίσω στο κουμπί
  menu.hidden = true;
  menu.setAttribute('aria-hidden', 'true');
  btn.setAttribute('aria-expanded', 'false');
  document.getElementById(id + '-btn-arrow').textContent = '▼';
  btn.focus();
}

function updateStartScreenForGame(game) {
  const isKremala = game !== 'sosto-lathos';

  // Sections αρχικής οθόνης (δυσκολία, λάθη)
  ['section-difficulty', 'section-maxwrong'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.hidden = !isKremala; el.setAttribute('aria-hidden', String(!isKremala)); }

  ['ss-hint-toggle', 'ss-posinfo-toggle', 'ss-quips-toggle', 'ss-section-kbtype'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.hidden = !isKremala; el.setAttribute('aria-hidden', String(!isKremala)); }

function loadPickerSelections() {
  // Επαναφορά αποθηκευμένων επιλογών από localStorage
  const savedDiff = localStorage.getItem('hangman_difficulty') || 'medium';
  const diffLabels = { easy: 'Εύκολο — Λέξεις έως 6 γράμματα', medium: 'Μέτριο — Όλες οι λέξεις', hard: 'Δύσκολο — Λέξεις 9 γράμματα και πάνω' };

  const savedWrong = localStorage.getItem('hangman_maxwrong') || '6';
  const wrongLabels = { '4': '4 λάθη — Πιο δύσκολο', '6': '6 λάθη — Κλασικό', '8': '8 λάθη — Πιο εύκολο' };
  if (wrongLabels[savedWrong]) selectPickerOptionSilent('maxwrong', savedWrong, wrongLabels[savedWrong]);

  const gameLabels = { kremala: 'Κρεμάλα', 'sosto-lathos': 'Σωστό ή λάθος' };

    selectPickerOptionSilent('games', savedGame, gameLabels[savedGame]);

    buildCategorySelect(savedGame);
  }
}

// ── Touch input listener ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('touch-letter-input');
  if (!inp) return;

  const LABEL_CLOSED = 'Πάτησε εδώ για άνοιγμα του πληκτρολογίου. Συντομεύσεις: 1 επανάληψη τελευταίου μηνύματος, 2 κατάσταση κρεμάλας, 3 πληροφορίες λέξης.';

  inp.addEventListener('focus', () => inp.setAttribute('aria-label', ''));
  inp.addEventListener('blur',  () => inp.setAttribute('aria-label', LABEL_CLOSED));

  // Καθυστερήσεις πληκτρολογίου αφής (ανεξάρτητες από τις υπόλοιπες)
  const TOUCH_TTS_DELAY  = 0; // ms — καθυστέρηση TTS για συντομεύσεις αφής
  const TOUCH_LIVE_DELAY = 0; // ms — καθυστέρηση live region για συντομεύσεις αφής

  inp.addEventListener('input', () => {
    const raw = inp.value;
    inp.value = '';
    if (/[0-9]/.test(raw)) {
      const digit = raw.match(/[0-9]/)[0];

      // Αριθμός 1 — επανάληψη τελευταίου μηνύματος
      if (digit === '1' && lastAnnouncement) {
        const sr1ti = document.getElementById('announce');
        const vis1ti = document.getElementById('announce-visual');
        sr1ti.textContent = ''; vis1ti.textContent = '';
        stopSpeech();
        setTimeout(() => speak(lastAnnouncement), TOUCH_TTS_DELAY);
        setTimeout(() => { sr1ti.textContent = lastAnnouncement; vis1ti.textContent = lastAnnouncement; }, TOUCH_LIVE_DELAY);
        return;
      }

      // Αριθμός 2 — κατάσταση κρεμάλας
      if (digit === '2') {
        const gs = document.getElementById('game-screen');
        if (gs && !gs.hidden) {
          const hangmanSrDesc = document.getElementById('hangman-sr-desc');
          const desc = hangmanSrDesc ? hangmanSrDesc.getAttribute('aria-label') : '';
          if (desc) {
            const sr2ti = document.getElementById('announce');
            const vis2ti = document.getElementById('announce-visual');
            sr2ti.textContent = ''; vis2ti.textContent = '';
            lastAnnouncement = desc;
            stopSpeech();
            setTimeout(() => speak(desc), TOUCH_TTS_DELAY);
            setTimeout(() => { sr2ti.textContent = desc; vis2ti.textContent = desc; }, TOUCH_LIVE_DELAY);
          }
        }
        return;
      }

      // Αριθμός 3 — πληροφορίες λέξης (κατηγορία + αριθμός γραμμάτων)
      if (digit === '3') {
        const gs = document.getElementById('game-screen');
        if (gs && !gs.hidden && word) {
          const entry = WORDS.find(e => e.word === word);
          const category = entry ? entry.category : '';
          const wordLen = word.replace(/ /g, '').length;
          const msg = category
            ? category + '. Η λέξη αποτελείται από ' + numToGreek(wordLen) + ' γράμματα.'
            : 'Η λέξη αποτελείται από ' + numToGreek(wordLen) + ' γράμματα.';
          const sr3ti = document.getElementById('announce');
          const vis3ti = document.getElementById('announce-visual');
          sr3ti.textContent = ''; vis3ti.textContent = '';
          lastAnnouncement = msg;
          stopSpeech();
          setTimeout(() => speak(msg), TOUCH_TTS_DELAY);
          setTimeout(() => { sr3ti.textContent = msg; vis3ti.textContent = msg; }, TOUCH_LIVE_DELAY);
        }
        return;
      }

      // Οποιοσδήποτε άλλος αριθμός
      announce(digit + ', απενεργοποιημένο.', TOUCH_TTS_DELAY, TOUCH_LIVE_DELAY);
      return;
    }
    if (/[a-zA-Z]/.test(raw)) {
      announce('Άλλαξε την γλώσσα πληκτρολογίου σε: Ελληνικά.', TOUCH_TTS_DELAY, TOUCH_LIVE_DELAY);
      return;
    }
    const filtered = raw.toUpperCase().replace(/[^ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩ]/g, '');
    if (filtered.length > 0) guess(filtered[0], true);
  });
});

      <span class="toggle-label" aria-hidden="true">🅰️ Κανονικό μέγεθος γραμματοσειράς</span>
      <span class="toggle-track" aria-hidden="true" role="presentation"><span class="toggle-thumb" aria-hidden="true" role="presentation"></span></span>
      <span class="toggle-state-label" id="ss-font-normal-state" aria-hidden="true">Ενεργή</span>
    </button>

    <button type="button" class="toggle-row" id="ss-font-large-toggle"
      role="switch" aria-checked="false"
      aria-label="Μεγάλη γραμματοσειρά"
      onclick="selectFont('large')">
      <span class="toggle-label" aria-hidden="true">🔠 Μεγάλη γραμματοσειρά</span>
      <span class="toggle-track" aria-hidden="true" role="presentation"><span class="toggle-thumb" aria-hidden="true" role="presentation"></span></span>
      <span class="toggle-state-label" id="ss-font-large-state" aria-hidden="true">Ανενεργή</span>
    </button>

    <button type="button" class="toggle-row" id="ss-font-xlarge-toggle"
      role="switch" aria-checked="false"
      aria-label="Πολύ μεγάλη γραμματοσειρά"
      onclick="selectFont('xlarge')">
      <span class="toggle-label" aria-hidden="true">🔡 Πολύ μεγάλη γραμματοσειρά</span>
      <span class="toggle-track" aria-hidden="true" role="presentation"><span class="toggle-thumb" aria-hidden="true" role="presentation"></span></span>
      <span class="toggle-state-label" id="ss-font-xlarge-state" aria-hidden="true">Ανενεργή</span>
    </button>
    </div>
    <button type="button" class="menu-close-btn" id="start-settings-close-btn" aria-label="Κλείσιμο μενού γενικών ρυθμίσεων" onclick="closeStartSettingsMenu()">✕ Κλείσιμο μενού</button>
    </div>
</body>
</html>
